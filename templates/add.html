{% extends "base.html" %}
{% block title %}添加节目 - 节目管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">添加新节目</h1>
    <p class="page-desc">填写节目信息并提交审核</p>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('add_program') }}">
        <div class="form-group">
            <label for="code">番号 * <span style="color: #dc2626;">(必填，唯一标识)</span></label>
            <input type="text" id="code" name="code" required placeholder="如: EP001, A001 等">
            <p class="form-hint">番号是节目的唯一标识符，不可重复</p>
        </div>
        
        <div class="form-group">
            <label for="title">节目标题 *</label>
            <input type="text" id="title" name="title" required placeholder="请输入节目标题">
        </div>
        
        <div class="form-group">
            <label for="date">发布日期 *</label>
            <input type="text" id="date" name="date" required placeholder="格式: YYYY-M-D (如: 2024-1-15)" pattern="\d{4}-\d{1,2}-\d{1,2}">
            <p class="form-hint">日期格式：年-月-日</p>
        </div>
        
        <div class="form-group">
            <label for="description">节目描述 *</label>
            <textarea id="description" name="description" required placeholder="请输入节目内容简介"></textarea>
        </div>
        
        <div class="form-group">
            <label for="link">收听链接 *</label>
            <input type="url" id="link" name="link" required placeholder="https://example.com/program">
        </div>
        
        <div class="form-group">
            <label for="related">关联已有节目</label>
            <select id="related" name="related" multiple style="height: 120px;">
                {% for program in programs %}
                <option value="{{ program.id }}">{{ program.code }} - {{ program.title }}</option>
                {% endfor %}
            </select>
            <p class="form-hint">按住 Ctrl 或 Cmd 键可多选已有节目</p>
        </div>
        
        <div class="form-group" style="background: #f0f9ff; padding: 16px; border-radius: 8px; border: 1px solid #bae6fd;">
            <label style="color: #0369a1;"><i class="fas fa-link"></i> 引用未来节目 (可选)</label>
            <p style="font-size: 0.85rem; color: #0369a1; margin-bottom: 12px;">
                如果你想引用一个尚未上传的节目，填写下方信息。当该节目被上传时会收到提醒。
            </p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div>
                    <input type="text" name="future_ref_code" placeholder="目标节目番号">
                </div>
                <div>
                    <input type="text" name="future_ref_title" placeholder="目标节目名称(部分匹配)">
                </div>
            </div>
            <p class="form-hint">填写番号或名称即可，当匹配的节目被上传时会自动提醒</p>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            <i class="fas fa-paper-plane"></i> 提交审核
        </button>
    </form>
</div>
{% endblock %}
