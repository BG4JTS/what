{% extends "base.html" %}
{% block title %}登录 - 节目管理系统{% endblock %}

{% block content %}
<div class="login-container">
    <h2>登录</h2>
    <p>使用GitHub账号登录以添加节目</p>
    
    <a href="{{ url_for('login_github') }}" class="login-btn">
        <i class="fab fa-github"></i>
        使用 GitHub 登录
    </a>
    
    <p style="margin-top: 24px; color: var(--text-secondary); font-size: 0.85rem;">
        <i class="fas fa-shield-alt"></i>
        登录即表示您同意我们的使用条款
    </p>
</div>
{% endblock %}
